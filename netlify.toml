# Root Netlify configuration - deploy frontend only
[build]
  base = "blink/frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

# SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & caching headers
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css"

# (Optional) Add API proxy later if backend hosted elsewhere
